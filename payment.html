<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VeilVPN — Secure Checkout</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: radial-gradient(circle at 10% 20%, #0b0e1a, #020408); font-family: 'Inter', sans-serif; color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .payment-container { max-width: 500px; width: 100%; background: rgba(15, 20, 35, 0.65); backdrop-filter: blur(20px); border-radius: 48px; border: 1px solid rgba(0, 255, 255, 0.4); padding: 2rem; box-shadow: 0 25px 45px rgba(0,0,0,0.5), 0 0 20px rgba(0,255,255,0.2); }
    h2 { font-size: 2rem; text-align: center; margin-bottom: 0.5rem; }
    .secure-badge { text-align: center; margin-bottom: 1.5rem; font-size: 0.8rem; color: #0ff; }
    .plan-summary { background: #0a0f1c; border-radius: 28px; padding: 1rem; margin-bottom: 2rem; border-left: 4px solid #0ff; }
    .form-group { margin-bottom: 1rem; }
    label { font-size: 0.8rem; font-weight: 500; display: block; margin-bottom: 5px; color: #bbd4ff; }
    input, select { width: 100%; padding: 12px 16px; background: rgba(0,0,0,0.5); border: 1px solid #2c3e66; border-radius: 20px; color: white; font-size: 1rem; outline: none; transition: 0.2s; }
    input:focus, select:focus { border-color: #0ff; box-shadow: 0 0 8px #0ff6; }
    .row2 { display: flex; gap: 1rem; }
    .pay-btn { width: 100%; background: linear-gradient(90deg, #0ff, #0055dd); border: none; padding: 1rem; border-radius: 50px; font-size: 1.2rem; font-weight: bold; color: #000; margin-top: 1rem; cursor: pointer; transition: 0.2s; }
    .card-icons { display: flex; gap: 10px; justify-content: center; margin: 1rem 0; font-size: 1.8rem; color: #ccd6f0; }
    .loader { display: none; text-align: center; margin: 1rem 0; }
    .success-message { display: none; background: #0f2a1f; border: 1px solid #0f0; border-radius: 32px; padding: 1rem; text-align: center; margin-top: 1rem; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .spinner { width: 40px; height: 40px; border: 4px solid rgba(0,255,255,0.3); border-top: 4px solid #0ff; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto; }
    a.back { color: #0ff; text-decoration: none; display: block; text-align: center; margin-top: 1rem; }
  </style>
</head>
<body>
<div class="payment-container">
  <h2><i class="fas fa-lock"></i> Secure Checkout</h2>
  <div class="secure-badge"><i class="fas fa-shield-alt"></i> 256-bit encrypted payment • SSL Secure</div>
  <div class="plan-summary" id="planSummary">Loading plan...</div>
  <form id="paymentForm">
    <div class="form-group"><label>Cardholder Name</label><input type="text" placeholder="John Doe" required></div>
    <div class="form-group"><label>Card Number</label><input type="text" placeholder="1234 5678 9012 3456" required></div>
    <div class="row2"><div class="form-group"><label>Expiration Date</label><input type="text" placeholder="MM/YY" required></div>
    <div class="form-group"><label>CVV</label><input type="password" placeholder="123" required></div></div>
    <div class="row2"><div class="form-group"><label>Country</label><select><option>United States</option><option>United Kingdom</option><option>Germany</option><option>Japan</option></select></div>
    <div class="form-group"><label>ZIP Code</label><input type="text" placeholder="10001" required></div></div>
    <div class="card-icons"><i class="fab fa-cc-visa"></i> <i class="fab fa-cc-mastercard"></i> <i class="fab fa-cc-amex"></i></div>
    <button type="submit" class="pay-btn" id="payBtn">Complete Payment <i class="fas fa-arrow-right"></i></button>
  </form>
  <div class="loader" id="loader"><div class="spinner"></div><p style="margin-top:8px;">Processing secure payment...</p></div>
  <div class="success-message" id="successMsg"><i class="fas fa-check-circle" style="font-size:2rem;color:#0f0"></i><h3>Payment Successful</h3><p id="activationMsg">Your VeilVPN protection is now active.</p></div>
  <a href="index.html" class="back"><i class="fas fa-arrow-left"></i> Back to home</a>
</div>
<script>
  const urlParams = new URLSearchParams(window.location.search);
  const planName = urlParams.get('plan') || 'MONTHLY';
  const price = urlParams.get('price') || '9.99';
  const period = urlParams.get('period') || 'month';
  document.getElementById('planSummary').innerHTML = `<strong>${planName} plan</strong><br>$${price} / ${period}<br><span style="color:#0ff;">✓ Unlimited devices, AES-256</span>`;

  const form = document.getElementById('paymentForm');
  const loader = document.getElementById('loader');
  const successDiv = document.getElementById('successMsg');
  const payBtn = document.getElementById('payBtn');
  form.addEventListener('submit', (e) => {
    e.preventDefault();
    payBtn.disabled = true;
    loader.style.display = 'block';
    setTimeout(() => {
      loader.style.display = 'none';
      successDiv.style.display = 'block';
      document.getElementById('activationMsg').innerHTML = `Your VeilVPN protection is now active.<br>Welcome to ${planName} plan.`;
      form.reset();
    }, 2200);
  });
</script>
</body>
</html>
